services:
  ai-video-transcriber:
    build: .
    ports:
      - "8000:8000"
    environment:
      # 必需：Gemini API密钥（请在.env文件中设置或直接修改）
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
      # 可选：统一模型（留空使用默认）
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      # 可选：关闭自动翻译（1/true/yes）
      - NO_TRANSLATE=${NO_TRANSLATE:-}
      # 服务器配置
      - HOST=0.0.0.0
      - PORT=8000
    # volumes:
      # 挂载临时文件目录，便于查看和管理下载的文件  
      # - ./temp:/app/temp
    restart: unless-stopped
    
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
